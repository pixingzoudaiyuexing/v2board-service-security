name: Build Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      description:
        description: 'release description.'
        required: false
        type: string

jobs:
  prepare:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package-version.outputs.version }}
      release_body_file: ${{ steps.release-body.outputs.file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package-version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Resolve release body file
        id: release-body
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          FILE="RELEASE_${VERSION}.md"
          if [ -f "$FILE" ]; then
            echo "file=$FILE" >> $GITHUB_OUTPUT
          else
            echo "file=" >> $GITHUB_OUTPUT
          fi

  build-executable:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Executable
        run: bun build:executable

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-executable
          path: dist/airbuddy-security-executable
          if-no-files-found: error

  build-docker-image:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build --platform linux/amd64 -t airbuddy-security:${{ needs.prepare.outputs.version }} .
          docker save airbuddy-security:${{ needs.prepare.outputs.version }} > airbuddy-security-docker-image-${{ needs.prepare.outputs.version }}.tar

      - name: Upload docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-docker-image
          path: airbuddy-security-docker-image-${{ needs.prepare.outputs.version }}.tar
          if-no-files-found: error

  build-js:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Node Dist
        run: bun run build:node

      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-js
          path: dist/index.js
          if-no-files-found: error

  release:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-executable
      - build-docker-image
      - build-js
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: release-executable
          path: release-assets

      - name: Download docker artifact
        uses: actions/download-artifact@v4
        with:
          name: release-docker-image
          path: release-assets

      - name: Download JS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-js
          path: release-assets

      - name: Create release notes fallback
        run: |
          if [ -n "${{ needs.prepare.outputs.release_body_file }}" ]; then
            cp "${{ needs.prepare.outputs.release_body_file }}" release-body.final.md
          elif [ -n "${{ inputs.description }}" ]; then
            printf '%s\n' "${{ inputs.description }}" > release-body.final.md
          else
            printf 'Release %s\n' "${{ needs.prepare.outputs.version }}" > release-body.final.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body_path: release-body.final.md
          draft: false
          files: |
            release-assets/airbuddy-security-executable
            release-assets/airbuddy-security-docker-image-${{ needs.prepare.outputs.version }}.tar
            release-assets/index.js
